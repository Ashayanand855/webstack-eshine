<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | eshine</title>
  <link rel="stylesheet" href="landing-page/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    .cart-container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .cart-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding: 20px 0; }
    .cart-item img { width: 100px; height: 120px; object-fit: cover; background: #f5f5f5; border-radius: 4px; }
    .cart-item h3 { margin: 0; font-size: 16px; font-weight: 500; width: 250px; }
    .cart-item p { font-size: 16px; font-weight: 600; }
    .cart-item button { padding: 8px 15px; background: var(--black); color: var(--white); border: none; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; transition: background 0.3s; }
    .cart-item button:hover { background: #333; }
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <p>Eshine</p>
</div>

<!-- Navbar -->
<header>
  <div class="container header-content">
    <a href="landing-page/index.html">
      <img src="landing-page/Eshine-Logo.png" alt="eshine" class="logo-img">
    </a>
    <nav class="nav-center">
      <a href="new arrival.html">New</a>
      <a href="men.html">Men</a>
      <a href="women.html">Women</a>
      <a href="jwell.html">Collections</a>
      <a href="#">AI Stylist</a>
    </nav>
    <div class="nav-icons">
      <a href="#" class="nav-icon-link" id="account-icon" title="Account">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none">
          <circle cx="12" cy="7" r="4"/>
          <path d="M5.5 21a6.5 6.5 0 0 1 13 0"/>
        </svg>
      </a>
      <a href="cart.html" class="nav-icon-link" id="cart-icon" title="Cart">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
          <path d="M3 6h18"/>
        </svg>
        <span class="cart-count hidden">0</span>
      </a>
    </div>
  </div>
</header>

<section class="container section-padding" style="min-height: 60vh;">
  <div class="products-header" style="margin-bottom: 40px; text-align: center;">
    <h1 style="font-size: 32px; font-weight: 400; text-transform: uppercase;">Your Cart</h1>
  </div>
  
  <div class="cart-container">
    <div id="cartItems">
      <!-- Cart items will be loaded here by script.js -->
    </div>
  </div>
</section>

<!-- Footer -->
<footer>
  <div class="container">
    <div class="footer-grid minimal-footer">
      <div class="footer-col">
        <h3>Contact Us</h3>
        <p class="phone">+91 98765 43210</p>
        <p class="small-desc">Available 9am - 7pm (IST)</p>
        <p class="email" style="margin-top: 15px;">hello@eshine.com</p>
      </div>
      <div class="footer-col social-col">
        <h3>Follow Us</h3>
        <div class="social-links-wrapper">
          <a href="#" class="social-link" title="Instagram">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            <span>Instagram</span>
          </a>
          <a href="#" class="social-link" title="Facebook">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
            </svg>
            <span>Facebook</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
